<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project — Cheng Jiang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #ffffff;
    --bg-alt:    #fafafa;
    --bg-soft:   #f5f5f5;
    --ink:       #111111;
    --ink-body:  #333333;
    --ink-muted: #888888;
    --ink-meta:  #555555;
    --border:    #e5e7eb;
    --border-soft: #f0f0f0;
    --font-sans: 'Inter', 'Noto Sans JP', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
    --font-cjk:  'Noto Sans JP', 'Noto Sans SC', 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
  }
  :root[lang="ja"] { --font-sans: 'Noto Sans JP', 'Noto Sans SC', 'Inter', system-ui, sans-serif; }
  :root[lang="zh"] { --font-sans: 'Noto Sans SC', 'Noto Sans JP', 'Inter', system-ui, sans-serif; }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink-body);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  img { display: block; max-width: 100%; height: auto; }

  /* ──────── Top bar ──────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border-soft);
  }
  .topbar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--ink-body);
    text-decoration: none;
    font-size: 13px;
    font-family: var(--font-mono);
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: color 0.2s ease, gap 0.2s ease;
  }
  .back-link:hover { color: var(--ink); gap: 14px; }
  .back-link svg { transition: transform 0.2s ease; }
  .back-link:hover svg { transform: translateX(-2px); }

  .crumb {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .crumb strong { color: var(--ink); font-weight: 500; }

  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 2px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
  }
  .lang-toggle button {
    background: none;
    border: 0;
    padding: 6px 8px;
    color: var(--ink-muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: color 0.15s ease;
  }
  .lang-toggle button:hover { color: var(--ink-body); }
  .lang-toggle button.active { color: var(--ink); }
  .lang-toggle .sep { color: var(--border); padding: 0 2px; }

  /* ──────── Header / hero meta ──────── */
  .hero {
    max-width: 1200px;
    margin: 0 auto;
    padding: 96px 48px 72px;
    border-bottom: 1px solid var(--border-soft);
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin: 0 0 24px;
  }
  .hero-title {
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0 0 32px;
    max-width: 14ch;
  }
  .hero-desc {
    font-size: 18px;
    line-height: 1.65;
    color: var(--ink-body);
    margin: 0 0 56px;
    max-width: 64ch;
  }
  .hero-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border-soft);
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .meta-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .meta-value {
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
  }

  /* ──────── Image stack ──────── */
  .stack {
    max-width: 1200px;
    margin: 0 auto;
    padding: 88px 48px 120px;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }

  .img-block {
    position: relative;
  }
  .img-block img {
    width: 100%;
    border-radius: 4px;
  }
  .img-caption {
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .img-caption .num {
    color: var(--ink);
    font-weight: 500;
  }
  .img-caption .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Layout variants */
  .img-full   { width: 100%; }
  .img-wide   { width: 92%; margin: 0 auto; }
  .img-medium { width: 78%; margin: 0 auto; }
  .img-narrow { width: 62%; margin: 0 auto; }

  /* Pair: two portraits side by side */
  .img-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  .img-pair .img-block { width: 100%; }
  .img-pair .img-block img { width: 100%; }

  /* ──────── Footer / next-prev ──────── */
  .nextnav {
    max-width: 1200px;
    margin: 0 auto;
    padding: 64px 48px 96px;
    border-top: 1px solid var(--border-soft);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .nextnav a {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 24px 0;
    text-decoration: none;
    color: var(--ink-body);
    transition: color 0.2s ease, transform 0.2s ease;
  }
  .nextnav a.disabled {
    pointer-events: none;
    opacity: 0.35;
  }
  .nextnav a:hover { color: var(--ink); }
  .nextnav .dir {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .nextnav .name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .nextnav .next-col { text-align: right; }

  /* Reveal animation */
  [data-reveal] {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  [data-reveal].in {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 900px) {
    .topbar-inner, .hero, .stack, .nextnav { padding-left: 24px; padding-right: 24px; }
    .hero { padding-top: 56px; padding-bottom: 48px; }
    .hero-title { font-size: 36px; }
    .hero-meta { grid-template-columns: 1fr 1fr; gap: 24px; }
    .stack { padding-top: 56px; gap: 40px; }
    .img-wide, .img-medium, .img-narrow { width: 100%; }
    .img-pair { grid-template-columns: 1fr; gap: 24px; }
    .nextnav { grid-template-columns: 1fr; }
    .nextnav .next-col { text-align: left; }
    .crumb { display: none; }
  }
</style>
</head>

        { src: "assets/detail/project-7/img-4.jpg", w: 2808, h: 2808 }, // square
        { src: "assets/detail/project-7/img-5.jpg", w: 2864, h: 2968 }  // square-ish
      ]
    }
  ];

  const I18N = {
    en: { back: "All work", design: "Design", prev: "Previous", next: "Next", meta_year: "Year", meta_role: "Role", meta_client: "Client", meta_category: "Category" },
    ja: { back: "作品一覧", design: "Design", prev: "前へ", next: "次へ", meta_year: "年", meta_role: "役割", meta_client: "クライアント", meta_category: "カテゴリ" },
    zh: { back: "返回作品", design: "Design", prev: "上一个", next: "下一个", meta_year: "年份", meta_role: "角色", meta_client: "客户", meta_category: "类别" }
  };

  /* ───────── Read URL params ───────── */
  const params = new URLSearchParams(location.search);
  const projectId = parseInt(params.get("id") || "1", 10);
  let currentLang = params.get("lang") || localStorage.getItem("lang") || "en";
  if (!I18N[currentLang]) currentLang = "en";

  const project = PROJECTS.find(p => p.id === projectId) || PROJECTS[0];
  const projIndex = PROJECTS.indexOf(project);
  const prevProject = projIndex > 0 ? PROJECTS[projIndex - 1] : null;
  const nextProject = projIndex < PROJECTS.length - 1 ? PROJECTS[projIndex + 1] : null;

  /* ───────── Content-aware layout decisions ───────── */
  /*
   * Classify each image by aspect ratio (w/h):
   *   > 1.55 → wide landscape  → full width
   *   > 1.20 → landscape       → wide (92%)
   *   > 0.95 → near square     → medium (78%)
   *   > 0.70 → portrait        → narrow (62%) — try to pair adjacent ones
   *   ≤ 0.70 → very tall       → narrow (52%) — single column
   *
   * Then a pairing pass: two consecutive portraits become a side-by-side pair.
   */
  function buildLayout(details) {
    const classified = details.map(d => {
      const ratio = d.w / d.h;
      let kind;
      if (ratio > 1.55) kind = "wide-landscape";
      else if (ratio > 1.20) kind = "landscape";
      else if (ratio > 0.95) kind = "square";
      else if (ratio > 0.70) kind = "portrait";
      else kind = "tall";
      return { ...d, ratio, kind };
    });

    // Pairing pass: collapse consecutive portrait/tall images into pairs
    const blocks = [];
    let i = 0;
    while (i < classified.length) {
      const cur = classified[i];
      const nxt = classified[i + 1];
      // pair two portraits OR a portrait + tall (similar verticality)
      const isVerticalish = (x) => x && (x.kind === "portrait" || x.kind === "tall");
      if (isVerticalish(cur) && isVerticalish(nxt)) {
        blocks.push({ type: "pair", items: [cur, nxt] });
        i += 2;
      } else {
        blocks.push({ type: "single", item: cur });
        i += 1;
      }
    }
    return blocks;
  }

  /* ───────── Render ───────── */
  function widthClass(kind) {
    return ({
      "wide-landscape": "img-full",
      "landscape":      "img-wide",
      "square":         "img-medium",
      "portrait":       "img-narrow",
      "tall":           "img-narrow"
    })[kind] || "img-medium";
  }

  function renderStack() {
    const stack = document.getElementById("stack");
    stack.innerHTML = "";
    const blocks = buildLayout(project.details);
    let n = 1;
    blocks.forEach((b, idx) => {
      const block = document.createElement("div");
      block.dataset.reveal = "";

      if (b.type === "pair") {
        block.className = "img-pair img-medium";
        const pad = (i) => String(i).padStart(2, "0");
        block.innerHTML = `
          <div class="img-block">
            <img src="${b.items[0].src}" alt="" loading="lazy" />
            <div class="img-caption"><span class="num">${pad(n)}</span><span class="line"></span></div>
          </div>
          <div class="img-block">
            <img src="${b.items[1].src}" alt="" loading="lazy" />
            <div class="img-caption"><span class="num">${pad(n + 1)}</span><span class="line"></span></div>
          </div>
        `;
        n += 2;
      } else {
        const item = b.item;
        block.className = `img-block ${widthClass(item.kind)}`;
        const num = String(n).padStart(2, "0");
        block.innerHTML = `
          <img src="${item.src}" alt="" loading="lazy" />
          <div class="img-caption"><span class="num">${num}</span><span class="line"></span></div>
        `;
        n += 1;
      }

      stack.appendChild(block);
    });

    // Reveal observer
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("in"); });
    }, { threshold: 0.08 });
    document.querySelectorAll("[data-reveal]").forEach(el => io.observe(el));
  }

  function renderMeta() {
    const l = currentLang;
    document.getElementById("hero-eyebrow").textContent = `${project.cat[l]} · ${project.year}`;
    document.getElementById("hero-title").textContent = project.title[l];
    document.getElementById("hero-desc").textContent = project.desc[l];
    document.getElementById("meta-year").textContent = project.year;
    document.getElementById("meta-role").textContent = project.role[l];
    document.getElementById("meta-client").textContent = project.client[l];
    document.getElementById("meta-cat").textContent = project.cat[l];
    document.getElementById("crumb-num").textContent = String(project.id).padStart(2, "0");
    document.title = `${project.title[l]} — Cheng Jiang`;

    // i18n labels
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const k = el.dataset.i18n;
      if (I18N[l][k]) el.textContent = I18N[l][k];
    });

    // prev/next
    const prevLink = document.getElementById("prev-link");
    const nextLink = document.getElementById("next-link");
    if (prevProject) {
      prevLink.href = `project.html?id=${prevProject.id}&lang=${l}`;
      document.getElementById("prev-name").textContent = prevProject.title[l];
      prevLink.classList.remove("disabled");
    } else {
      prevLink.classList.add("disabled");
      document.getElementById("prev-name").textContent = "—";
    }
    if (nextProject) {
      nextLink.href = `project.html?id=${nextProject.id}&lang=${l}`;
      document.getElementById("next-name").textContent = nextProject.title[l];
      nextLink.classList.remove("disabled");
    } else {
      nextLink.classList.add("disabled");
      document.getElementById("next-name").textContent = "—";
    }

    // back link preserves lang
    document.getElementById("back-link").href = `index.html?lang=${l}#design`;

    // lang toggle highlight
    document.querySelectorAll(".lang-toggle button").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === l);
    });

    // html lang attribute
    document.documentElement.setAttribute("lang", l);
  }

  /* ───────── Lang toggle ───────── */
  document.querySelectorAll(".lang-toggle button").forEach(b => {
    b.addEventListener("click", () => {
      currentLang = b.dataset.lang;
      localStorage.setItem("lang", currentLang);
      renderMeta();
    });
  });

  /* ───────── Init ───────── */
  renderMeta();
  renderStack();
</script>

</body>
</html>
